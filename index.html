<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#1f3a30" />
<title>Medicine4Youth</title>
<link rel="icon" href="./assets/medicine4youth-logo.png" type="image/png" sizes="any" />
<link rel="apple-touch-icon" href="./assets/medicine4youth-logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Nunito+Sans:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous"/>
<style>
/* Medicine4Youth: design tokens + base */
:root{
  --g900:#1f3a30;      /* deeper for text */
  --g800:#385A4E;      /* deep green brand */
  --g600:#5f8a78;
  --g500:#87B783;      /* sage */
  --g300:#BCDBA5;      /* muted light */
  --g100:#DDF7CD;      /* pale */
  --g50:#F1FBE7;       /* whisper */
  --cream:#FBF9F4;
  --paper:#FFFFFF;
  --ink:#121A16;
  --ink2:#3a463f;
  --mute:#6b7a72;
  --line:#E4E8DE;
  --line2:#D2DCC3;

  --r-sm:8px; --r:14px; --r-lg:22px; --r-xl:32px;
  --sh-1:0 1px 2px rgba(20,40,30,.06), 0 1px 1px rgba(20,40,30,.04);
  --sh-2:0 6px 18px -8px rgba(30,60,45,.18), 0 2px 6px rgba(30,60,45,.06);
  --sh-3:0 30px 60px -30px rgba(30,60,45,.35), 0 10px 20px -10px rgba(30,60,45,.12);

  --f-display:'Roboto', system-ui, sans-serif;
  --f-body:'Nunito Sans', 'Avenir Next', 'Avenir', system-ui, sans-serif;
  --f-mono:'JetBrains Mono', ui-monospace, monospace;

  --max:1240px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--f-body);
  font-size:16px;
  color:var(--ink);
  background:var(--cream);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  line-height:1.6;
}
img,svg{display:block;max-width:100%}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:inherit;text-decoration:none}

h1,h2,h3,h4{font-family:var(--f-display);font-weight:900;letter-spacing:-0.02em;margin:0;color:var(--g900);text-wrap:balance}
h1{font-size:clamp(44px, 6vw, 84px); line-height:0.98}
h2{font-size:clamp(32px, 3.6vw, 52px); line-height:1.02}
h3{font-size:clamp(20px, 1.8vw, 26px); line-height:1.2}
h4{font-size:18px;line-height:1.3}
p{margin:0; text-wrap:pretty}
.mono{font-family:var(--f-mono); font-size:12px; letter-spacing:0.04em; text-transform:uppercase}

.container{max-width:var(--max); margin:0 auto; padding:0 28px}
.section{padding:clamp(56px, 8vw, 120px) 0}
.eyebrow{
  display:inline-flex; align-items:center; gap:10px;
  font-family:var(--f-mono); font-size:11px; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--g800);
}
.eyebrow::before{content:""; width:22px; height:1px; background:var(--g800)}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; gap:10px;
  padding:14px 22px; border-radius:999px; font-weight:700;
  font-family:var(--f-body); font-size:15px; letter-spacing:0.01em;
  transition:transform .2s ease, background .2s ease, color .2s ease, box-shadow .2s ease, border-color .2s ease;
  border:1px solid transparent; line-height:1;
}
.btn .arr{transition:transform .25s ease}
.btn:hover .arr{transform:translateX(3px)}
.btn-primary{background:var(--g800); color:#fff}
.btn-primary:hover{background:var(--g900); box-shadow:var(--sh-2)}
.btn-ghost{background:transparent; color:var(--g900); border-color:var(--line2)}
.btn-ghost:hover{background:var(--g50); border-color:var(--g500)}
.btn-cream{background:#fff; color:var(--g900); border-color:var(--line)}
.btn-cream:hover{background:var(--g50)}
.btn-sm{padding:10px 16px; font-size:13px}
.btn-lg{padding:18px 28px; font-size:16px}

/* Cards */
.card{
  background:var(--paper); border:1px solid var(--line);
  border-radius:var(--r-lg); box-shadow:var(--sh-1);
  transition:transform .3s ease, box-shadow .3s ease, border-color .3s ease;
}
.card:hover{transform:translateY(-3px); box-shadow:var(--sh-2); border-color:var(--line2)}

/* Placeholder imagery */
.ph{
  position:relative; border-radius:var(--r-lg); overflow:hidden;
  background:
    repeating-linear-gradient(135deg, rgba(56,90,78,.07) 0 2px, transparent 2px 14px),
    linear-gradient(180deg, var(--g100), var(--g300));
  border:1px solid var(--line2);
}
.ph::after{
  content:attr(data-label);
  position:absolute; inset:auto 12px 12px auto;
  font-family:var(--f-mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase;
  color:var(--g900); background:rgba(255,255,255,.7); padding:5px 8px; border-radius:6px;
  border:1px solid var(--line2);
}
.ph.dark{
  background:
    repeating-linear-gradient(135deg, rgba(255,255,255,.08) 0 2px, transparent 2px 14px),
    linear-gradient(180deg, #2c4a3f, #1f3a30);
}
.ph.dark::after{color:#fff; background:rgba(0,0,0,.35); border-color:rgba(255,255,255,.2)}
.ph.sage{
  background:
    repeating-linear-gradient(135deg, rgba(56,90,78,.1) 0 2px, transparent 2px 12px),
    linear-gradient(180deg, var(--g300), var(--g500));
}

/* Nav */
.nav{
  position:sticky; top:0; z-index:80;
  backdrop-filter:saturate(1.1) blur(14px);
  background:rgba(251,249,244,0.78);
  border-bottom:1px solid rgba(0,0,0,0.06);
}
.nav-in{display:flex; align-items:center; gap:16px; padding:16px 24px; max-width:1120px; margin:0 auto}
.brandmark{display:flex; align-items:center; gap:12px; font-family:var(--f-display); font-weight:900; color:var(--g900); flex-shrink:0}
.brandmark-logo{
  width:36px; height:36px; border-radius:50%; object-fit:contain;
  flex-shrink:0; box-shadow:var(--sh-1); border:1px solid rgba(56,90,78,.12);
}
.brandmark-logo--footer{
  width:44px; height:44px;
  box-shadow:0 0 0 2px rgba(255,255,255,.22), var(--sh-1);
  border-color:rgba(255,255,255,.2);
}
.brandmark--on-dark .brandmark-logo{box-shadow:0 0 0 2px rgba(255,255,255,.2), var(--sh-1)}
.hero-brand-logo{
  width:clamp(52px, 12vw, 72px); height:clamp(52px, 12vw, 72px);
  border-radius:50%; object-fit:contain;
  box-shadow:var(--sh-2); border:1px solid var(--line2);
}
.nav-links{display:flex; gap:2px; margin-left:auto}
.nav-links a{
  display:inline-flex; align-items:center; justify-content:center;
  height:44px; min-width:72px;
  padding:0 16px; border-radius:999px; font-size:13px; color:var(--ink2);
  font-weight:600; line-height:1; transition:background .2s, color .2s;
}
.nav-links a:hover{background:var(--g50); color:var(--g900)}
.nav-links a.active{background:var(--g100); color:var(--g900)}
.nav-cta{display:flex; gap:8px; align-items:center; flex-shrink:0}
.mobile-menu-btn{display:none}
.brandmark > span{white-space:nowrap}

/* Hero */
.hero{
  position:relative; overflow:hidden;
  padding:clamp(48px, 8vw, 110px) 0 clamp(60px, 8vw, 100px);
}
.hero-bg{
  position:absolute; inset:0; z-index:0;
  background:
    radial-gradient(60% 80% at 85% 10%, rgba(188,219,165,.42), transparent 60%),
    radial-gradient(50% 70% at 10% 100%, rgba(135,183,131,.22), transparent 60%),
    linear-gradient(180deg, #fafcf8 0%, #f6faf0 100%);
}
.hero-grid{position:absolute; inset:0; z-index:0; opacity:.35;
  background-image:
    linear-gradient(var(--line2) 1px, transparent 1px),
    linear-gradient(90deg, var(--line2) 1px, transparent 1px);
  background-size:48px 48px;
  mask-image:radial-gradient(ellipse at 50% 30%, black 30%, transparent 75%);
}
.hero .eyebrow{letter-spacing:0.12em}
.hero-in{position:relative; z-index:1}

/* Misc utils */
.stack{display:flex; flex-direction:column}
.row{display:flex}
.grid{display:grid}
.dot{width:6px;height:6px;border-radius:50%;background:var(--g500);display:inline-block}
.pill{
  display:inline-flex; align-items:center; gap:8px;
  padding:6px 12px; border-radius:999px; background:#fff; border:1px solid var(--line);
  font-size:12px; font-weight:600; color:var(--ink2);
}
.pill.sage{background:var(--g100); border-color:var(--g300); color:var(--g900)}
.pill.deep{background:var(--g800); border-color:var(--g800); color:#fff}
.divider{height:1px; background:var(--line); width:100%}

/* Footer */
footer{background:var(--g900); color:#d9e3dc; padding:72px 0 36px; margin-top:60px}
footer h4{color:#fff}
footer a{color:#c3d2c7}
footer a:hover{color:#fff}

/* Reveal on scroll */
.reveal{opacity:0; transform:translateY(18px); transition:opacity .7s ease, transform .7s ease}
.reveal.in{opacity:1; transform:none}

/* Tabs */
.tabs{display:flex; gap:4px; flex-wrap:wrap; padding:5px; background:#fff; border:1px solid var(--line); border-radius:999px; width:fit-content}
.tab{padding:10px 20px; border-radius:999px; font-size:13px; font-weight:600; color:var(--ink2); cursor:pointer; transition:all .2s; min-height:44px; display:inline-flex; align-items:center}
.tab:hover{background:var(--g50)}
.tab.active{background:var(--g800); color:#fff}

/* Ticker */
.ticker{overflow:hidden; border-block:1px solid var(--line); background:var(--paper)}
.ticker-track{display:flex; gap:56px; padding:18px 0; animation:scroll 40s linear infinite; white-space:nowrap; align-items:center}
@keyframes scroll{from{transform:translateX(0)} to{transform:translateX(-50%)}}

/* Branch carousel */
.branch-carousel{
  overflow:hidden;
  border-radius:24px;
  position:relative;
  padding:8px 0 10px;
}
.branch-carousel::before,
.branch-carousel::after{
  content:"";
  position:absolute;
  top:0;
  width:120px;
  height:100%;
  z-index:2;
  pointer-events:none;
}
.branch-carousel::before{
  left:0;
  background:linear-gradient(90deg, var(--g50), transparent);
}
.branch-carousel::after{
  right:0;
  background:linear-gradient(270deg, var(--g50), transparent);
}
.branch-carousel-track{
  display:flex;
  gap:24px;
  width:max-content;
  animation:branchScroll 52s linear infinite;
  padding:8px 10px;
}
.branch-carousel:hover .branch-carousel-track{
  animation-play-state:paused;
}
.branch-carousel-item{
  width:min(430px, 82vw);
}
.branch-card{
  transition:transform .28s ease, box-shadow .28s ease, border-color .28s ease, opacity .28s ease;
  opacity:.92;
  background:#fff;
}
.branch-carousel:hover .branch-card{
  opacity:.55;
}
.branch-card:hover{
  transform:translateY(-5px) scale(1.01);
  box-shadow:var(--sh-3);
  border-color:var(--g300);
  opacity:1 !important;
}
@keyframes branchScroll{
  from{transform:translateX(0)}
  to{transform:translateX(calc(-50% - 8px))}
}
.branch-carousel-mobile{display:none}

/* Forms */
.field{display:flex; flex-direction:column; gap:8px}
.field label{font-size:13px; font-weight:700; letter-spacing:0.03em; color:var(--ink2); text-transform:uppercase}
.field input,.field select,.field textarea{
  padding:14px 16px; border:1px solid var(--line); border-radius:12px; font:inherit; font-size:16px; background:#fff; min-height:48px;
}
.field input:focus,.field select:focus,.field textarea:focus{outline:none; border-color:var(--g500); box-shadow:0 0 0 4px rgba(135,183,131,.22)}

/* Page-intro */
.page-hero{position:relative; overflow:hidden; padding:clamp(64px,8vw,120px) 0 clamp(40px,5vw,70px)}

/* Branch theme overrides */
[data-branch="neuro"]{--accent:oklch(0.58 0.12 275)}
[data-branch="rehab"]{--accent:oklch(0.62 0.13 35)}
[data-branch="psych"]{--accent:oklch(0.62 0.12 340)}
[data-branch="surgery"]{--accent:oklch(0.55 0.14 25)}
[data-branch="endo"]{--accent:oklch(0.65 0.13 210)}
[data-branch="optom"]{--accent:oklch(0.65 0.12 190)}
[data-branch="dentistry"]{--accent:oklch(0.72 0.08 230)}
[data-branch="pharmacy"]{--accent:oklch(0.55 0.14 145)}
[data-branch="bioeng"]{--accent:oklch(0.62 0.16 260)}
[data-branch="charity"]{--accent:oklch(0.62 0.14 25)}

.branch-hero{
  position:relative; padding:clamp(80px,9vw,140px) 0; color:var(--g900);
  background:
    radial-gradient(70% 90% at 85% 10%, color-mix(in oklab, var(--accent) 22%, transparent) 0%, transparent 60%),
    linear-gradient(180deg, var(--g50), var(--cream));
  overflow:hidden;
}
.branch-badge{
  display:inline-flex; align-items:center; gap:8px;
  padding:8px 14px; border-radius:999px;
  background:color-mix(in oklab, var(--accent) 18%, #fff);
  border:1px solid color-mix(in oklab, var(--accent) 35%, var(--line));
  color:var(--g900); font-weight:700; font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
}

/* misc overrides */
.link-underline{position:relative; font-weight:700}
.link-underline::after{content:""; position:absolute; left:0; right:0; bottom:-2px; height:1.5px; background:currentColor; transform:scaleX(0); transform-origin:left; transition:transform .3s ease}
.link-underline:hover::after{transform:scaleX(1)}

/* Scrollbar flourish */
::selection{background:var(--g300); color:var(--g900)}

/* Responsive: hamburger at 1200px (10 nav links + brand + CTAs need more than ~900px) */
@media (max-width: 1200px){
  .nav-links{display:none}
  .nav-cta a{display:none}
  .nav-cta .mobile-menu-btn{display:inline-flex}
}
@media (max-width: 900px){
  .hero h1{font-size:clamp(36px, 9vw, 54px)}
  .container{padding:0 20px}
}

@media (max-width: 760px){
  .section{padding:56px 0}
  .nav-in{padding:10px 14px}
  .branch-carousel{display:none}
  .branch-carousel-mobile{display:block}
  .booklet-wrapper{grid-template-columns:1fr}
  .featured-grid{grid-template-columns:1fr !important}
}

/* ====================================================
   DARK MODE
   ==================================================== */
[data-theme="dark"]{
  --cream:#0d1b12;
  --paper:#111f18;
  --ink:#daeee3;
  --ink2:#90b4a0;
  --mute:#65887a;
  --line:#1c3227;
  --line2:#253f2f;
  --g50:#09130d;
  --g100:#111f18;
  --g300:#1e3d2e;
}
[data-theme="dark"] body{color:var(--ink);background:var(--cream)}
[data-theme="dark"] h1,[data-theme="dark"] h2,[data-theme="dark"] h3,[data-theme="dark"] h4{color:var(--ink)}
[data-theme="dark"] .card{background:var(--paper);border-color:var(--line2)}
[data-theme="dark"] .card:hover{border-color:var(--g500)}
[data-theme="dark"] .nav{background:rgba(13,27,18,.94);border-bottom-color:rgba(255,255,255,.07)}
[data-theme="dark"] .hero-bg{
  background:
    radial-gradient(60% 80% at 85% 10%, rgba(56,90,78,.28), transparent 60%),
    linear-gradient(180deg,#0b1910 0%,#091410 100%)
}
[data-theme="dark"] .hero-grid{opacity:.1;filter:invert(1)}
[data-theme="dark"] .page-hero{background:linear-gradient(180deg,var(--g50),var(--cream))}
[data-theme="dark"] .tabs{background:var(--paper);border-color:var(--line2)}
[data-theme="dark"] .tab{color:var(--ink2)}
[data-theme="dark"] .tab:hover{background:var(--g300);color:var(--ink)}
[data-theme="dark"] .tab.active{background:var(--g800);color:#fff}
[data-theme="dark"] .pill{background:var(--paper);border-color:var(--line2);color:var(--ink2)}
[data-theme="dark"] .pill.sage{background:rgba(30,61,46,.55);color:var(--g300);border-color:rgba(56,90,78,.45)}
[data-theme="dark"] .pill.deep{background:var(--g800);color:#fff;border-color:var(--g800)}
[data-theme="dark"] .btn-ghost{color:var(--ink);border-color:var(--line2)}
[data-theme="dark"] .btn-ghost:hover{background:var(--g300);border-color:var(--g500);color:var(--ink)}
[data-theme="dark"] .btn-cream{background:var(--paper);color:var(--ink);border-color:var(--line2)}
[data-theme="dark"] .field input,[data-theme="dark"] .field select,[data-theme="dark"] .field textarea{
  background:var(--paper);border-color:var(--line2);color:var(--ink)
}
[data-theme="dark"] .four-col-grid-line{background:var(--line2);border-color:var(--line2)}
[data-theme="dark"] .ticker{background:var(--paper);border-block-color:var(--line2)}
[data-theme="dark"] footer{background:#060e09}
[data-theme="dark"] .branch-hero{
  background:
    radial-gradient(70% 90% at 85% 10%,color-mix(in oklab,var(--accent) 18%,transparent),transparent 60%),
    linear-gradient(180deg,var(--g50),var(--cream))
}
[data-theme="dark"] .branch-carousel::before{background:linear-gradient(90deg,var(--cream),transparent)}
[data-theme="dark"] .branch-carousel::after{background:linear-gradient(270deg,var(--cream),transparent)}
[data-theme="dark"] .mobile-menu-panel{background:var(--cream) !important}
[data-theme="dark"] .ph{border-color:var(--line2)}

/* Dark mode toggle */
.theme-toggle-btn{
  width:38px;height:38px;border-radius:999px;
  display:inline-flex;align-items:center;justify-content:center;
  background:transparent;border:1px solid var(--line2);
  color:var(--mute);cursor:pointer;
  transition:background .2s,color .2s,border-color .2s;
  flex-shrink:0;
}
.theme-toggle-btn:hover{background:var(--g50);color:var(--g900);border-color:var(--g500)}
[data-theme="dark"] .theme-toggle-btn:hover{background:var(--g300);color:var(--ink)}

/* ====================================================
   ECG HERO ANIMATION
   ==================================================== */
.ecg-hero-container{
  position:absolute;inset:0;
  z-index:1;pointer-events:none;
  display:flex;align-items:center;overflow:hidden;
  mask-image:linear-gradient(90deg,transparent 0%,black 5%,black 95%,transparent 100%);
  -webkit-mask-image:linear-gradient(90deg,transparent 0%,black 5%,black 95%,transparent 100%);
}
.ecg-track{
  display:inline-flex;align-items:center;
  animation:ecgScroll 22s linear infinite;
  will-change:transform;
  opacity:0.18;
  transition:opacity .5s ease, filter .5s ease;
}
.ecg-track.ecg-hovered{
  opacity:0.48;
  filter:drop-shadow(0 0 8px rgba(58,138,98,.35));
}
.ecg-cursor-line{
  position:absolute;top:0;bottom:0;width:1px;
  background:linear-gradient(180deg,transparent 0%,rgba(74,222,128,.5) 25%,rgba(74,222,128,.95) 50%,rgba(74,222,128,.5) 75%,transparent 100%);
  pointer-events:none;
}
.ecg-spotlight{
  position:absolute;border-radius:50%;width:380px;height:380px;
  background:radial-gradient(circle,rgba(74,222,128,.13) 0%,rgba(74,222,128,.04) 40%,transparent 70%);
  pointer-events:none;transform:translate(-50%,-50%);transition:left .06s,top .06s;
}
.ecg-monitor{
  position:absolute;top:28px;right:36px;
  font-family:var(--f-mono);letter-spacing:.06em;text-transform:uppercase;
  pointer-events:none;display:flex;flex-direction:column;align-items:flex-end;gap:2px;
}
.ecg-monitor-bpm{
  font-size:48px;font-weight:700;letter-spacing:-.03em;line-height:1;
  color:#4ade80;text-shadow:0 0 24px rgba(74,222,128,.7),0 0 60px rgba(74,222,128,.3);
}
.ecg-monitor-label{font-size:10px;color:rgba(74,222,128,.6)}
[data-theme="dark"] .ecg-track{opacity:0.38}
@keyframes ecgScroll{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* ====================================================
   EST 2020 BADGE
   ==================================================== */
@keyframes estSlideIn{
  from{opacity:0;transform:translateY(14px) scale(.9);letter-spacing:.28em}
  to{opacity:1;transform:translateY(0) scale(1);letter-spacing:.18em}
}
.est-badge{
  display:inline-flex;align-items:center;gap:6px;
  font-family:var(--f-mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--g800);padding:7px 14px;border-radius:999px;
  border:1px solid var(--g300);background:rgba(255,255,255,.72);
  backdrop-filter:blur(8px);width:fit-content;
  animation:estSlideIn 1.1s cubic-bezier(.34,1.5,.64,1) .25s both;
}
[data-theme="dark"] .est-badge{background:rgba(20,50,35,.55);color:var(--g300);border-color:var(--g800)}

/* ====================================================
   FEATURED PROJECTS
   ==================================================== */
.featured-projects-section{background:var(--g900);color:#fff;padding:clamp(56px,8vw,120px) 0}
.featured-card{
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.11);
  border-radius:var(--r-lg);overflow:hidden;
  transition:background .28s,border-color .28s,transform .28s;
}
.featured-card:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.25);transform:translateY(-4px)}
.featured-card-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);
}
.featured-card-badge.accent{background:rgba(135,183,131,.22);border-color:rgba(135,183,131,.4);color:#a8dba0}

/* ====================================================
   INSTAGRAM CAROUSEL
   ==================================================== */
.ig-scroll-outer{
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;
  padding:4px 0 20px;margin:0 -28px;padding-left:28px;
}
.ig-scroll-outer::-webkit-scrollbar{display:none}
.ig-scroll-track{display:flex;gap:14px;width:max-content;padding-right:28px}
.ig-post-card{
  width:230px;border-radius:var(--r-lg);overflow:hidden;
  border:1px solid var(--line);background:var(--paper);flex-shrink:0;
  transition:transform .25s,box-shadow .25s;cursor:pointer;
}
.ig-post-card:hover{transform:translateY(-5px);box-shadow:var(--sh-2)}
[data-theme="dark"] .ig-post-card{background:var(--paper);border-color:var(--line2)}

/* ====================================================
   PHILIPPINES TUTORING SECTION
   ==================================================== */
.philippines-section{
  background:linear-gradient(135deg,#0c3024 0%,#1a4a33 55%,#0c2a1e 100%);
  color:#fff;position:relative;overflow:hidden;
}
.philippines-section::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 70% at 20% 60%,rgba(135,183,131,.12),transparent 60%),
    radial-gradient(ellipse 40% 50% at 85% 20%,rgba(188,219,165,.08),transparent 55%);
}
.philippines-stat-box{
  padding:20px 24px;border-radius:var(--r-lg);
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
}

/* ====================================================
   CHAPTER MAP
   ==================================================== */
.map-outer{border-radius:var(--r-xl);overflow:hidden;border:1px solid var(--line);background:var(--paper)}
.map-search-wrap{padding:20px 24px;border-bottom:1px solid var(--line);position:relative}
.map-search-wrap input{
  width:100%;padding:12px 16px 12px 44px;
  border:1px solid var(--line2);border-radius:12px;
  font:inherit;font-size:15px;background:var(--g50);
  transition:border-color .2s,box-shadow .2s;
}
.map-search-wrap input:focus{outline:none;border-color:var(--g500);box-shadow:0 0 0 4px rgba(135,183,131,.2)}
.map-search-icon{position:absolute;left:40px;top:50%;transform:translateY(-50%);color:var(--mute);pointer-events:none}
.map-svg-wrap{position:relative;width:100%;padding-top:0}
.chapter-dot-wrapper{cursor:pointer}
.chapter-dot-wrapper:hover .chapter-dot-circle{r:8;fill:#ff1a1a}
.chapter-tooltip{
  position:absolute;pointer-events:none;background:var(--g900);color:#fff;
  padding:7px 11px;border-radius:8px;font-size:12px;font-weight:600;
  white-space:nowrap;z-index:20;box-shadow:var(--sh-2);
  transform:translateX(-50%);transition:none;
}
[data-theme="dark"] .map-outer{background:var(--paper);border-color:var(--line2)}
[data-theme="dark"] .map-search-wrap{border-bottom-color:var(--line2)}
[data-theme="dark"] .map-search-wrap input{background:var(--g50);border-color:var(--line2);color:var(--ink)}

/* ====================================================
   BOOKLET / PAGE-FLIP
   ==================================================== */
.booklet-shell{perspective:1600px}
.booklet-wrapper{
  display:grid;grid-template-columns:1fr 1fr;
  min-height:480px;border-radius:var(--r-xl);
  overflow:hidden;box-shadow:var(--sh-3);border:1px solid var(--line);
}
.booklet-left{
  background:linear-gradient(160deg,var(--g50),var(--cream));
  padding:clamp(28px,4vw,48px);border-right:2px solid var(--line2);
  display:flex;flex-direction:column;gap:14px;
}
.booklet-right{
  background:var(--paper);
  padding:clamp(28px,4vw,48px);
  display:flex;flex-direction:column;gap:18px;position:relative;overflow:hidden;
}
.booklet-nav{display:flex;gap:10px;align-items:center;margin-top:auto;padding-top:20px;border-top:1px solid var(--line)}
.page-turn-anim{animation:pageTurn .55s cubic-bezier(.77,0,.18,1) both}
@keyframes pageTurn{
  0%{opacity:1;transform:rotateY(0)}
  50%{opacity:0;transform:rotateY(-25deg)}
  100%{opacity:1;transform:rotateY(0)}
}
[data-theme="dark"] .booklet-left{background:linear-gradient(160deg,var(--g50),var(--paper))}
[data-theme="dark"] .booklet-right{background:var(--paper)}
[data-theme="dark"] .booklet-wrapper{border-color:var(--line2)}

/* ====================================================
   BRANCH PUBLICATIONS
   ==================================================== */
.publication-download-card{
  background:linear-gradient(135deg,var(--g50),var(--cream));
  border:1px solid var(--g300);border-radius:var(--r-lg);padding:28px;
  display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;
}
.pub-icon-box{
  width:56px;height:56px;border-radius:14px;
  background:var(--g100);border:1px solid var(--g300);
  display:grid;place-items:center;color:var(--g800);flex-shrink:0;
}
.magazine-placeholder-card{
  background:linear-gradient(135deg,var(--g900),#2a1a4a);
  color:#fff;border-radius:var(--r-lg);overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
}
[data-theme="dark"] .publication-download-card{background:var(--paper);border-color:var(--line2)}
[data-theme="dark"] .pub-icon-box{background:var(--g300);border-color:var(--line2)}

/* ====================================================
   PREMIUM LANDING (home redesign)
   ==================================================== */
/* Scroll progress bar */
.lp-progress{position:fixed;top:0;left:0;right:0;height:3px;transform-origin:0 50%;z-index:120;
  background:linear-gradient(90deg,var(--g500),var(--g800),var(--g300));}

/* Animated aurora mesh background */
.aurora{position:absolute;inset:-20% -10%;pointer-events:none;z-index:0;filter:blur(60px);opacity:.55}
.aurora .blob{position:absolute;border-radius:50%;mix-blend-mode:multiply;will-change:transform}
.aurora .b1{width:46vw;height:46vw;left:-6%;top:-12%;background:radial-gradient(circle at 30% 30%,rgba(135,183,131,.55),transparent 65%);animation:auroraA 22s ease-in-out infinite}
.aurora .b2{width:40vw;height:40vw;right:-8%;top:2%;background:radial-gradient(circle at 60% 40%,rgba(188,219,165,.6),transparent 65%);animation:auroraB 26s ease-in-out infinite}
.aurora .b3{width:38vw;height:38vw;left:24%;bottom:-18%;background:radial-gradient(circle at 50% 50%,rgba(94,158,111,.4),transparent 65%);animation:auroraC 30s ease-in-out infinite}
[data-theme="dark"] .aurora{mix-blend-mode:screen;opacity:.4}
[data-theme="dark"] .aurora .blob{mix-blend-mode:screen}
@keyframes auroraA{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(8%,6%) scale(1.15)}}
@keyframes auroraB{0%,100%{transform:translate(0,0) scale(1.05)}50%{transform:translate(-7%,9%) scale(.92)}}
@keyframes auroraC{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5%,-8%) scale(1.1)}}
@media (prefers-reduced-motion:reduce){.aurora .blob{animation:none}}

/* Kinetic headline — word + line reveal */
.kinetic{display:block}
.kinetic .line{display:block;overflow:hidden}
.kinetic .word{display:inline-block;transform:translateY(115%) rotate(4deg);opacity:0;
  transition:transform .9s cubic-bezier(.16,1,.3,1),opacity .9s cubic-bezier(.16,1,.3,1)}
.kinetic.in .word{transform:translateY(0) rotate(0);opacity:1}

/* Magnetic button wrapper */
.magnetic{display:inline-flex;will-change:transform}

/* Tilt / glow card */
.tilt{transform-style:preserve-3d;will-change:transform;transition:transform .3s cubic-bezier(.16,1,.3,1)}
.tilt-inner{transform:translateZ(40px);transform-style:preserve-3d}
.glow-card{position:relative;overflow:hidden}
.glow-card::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .35s;z-index:1;pointer-events:none;
  background:radial-gradient(420px circle at var(--mx,50%) var(--my,50%),rgba(255,255,255,.16),transparent 45%)}
.glow-card:hover::before{opacity:1}

/* Hero scroll cue */
.scroll-cue{position:absolute;left:50%;bottom:26px;transform:translateX(-50%);display:flex;flex-direction:column;
  align-items:center;gap:8px;color:var(--mute);font-family:var(--f-mono);font-size:10.5px;letter-spacing:.18em;
  text-transform:uppercase;z-index:3}
.scroll-cue .mouse{width:24px;height:38px;border:1.5px solid var(--g500);border-radius:14px;position:relative}
.scroll-cue .mouse::after{content:'';position:absolute;left:50%;top:7px;width:4px;height:7px;border-radius:3px;
  background:var(--g600);transform:translateX(-50%);animation:cueScroll 1.6s ease-in-out infinite}
@keyframes cueScroll{0%{opacity:0;transform:translate(-50%,0)}40%{opacity:1}80%{opacity:0;transform:translate(-50%,12px)}100%{opacity:0}}

/* Floating marquee strip in hero */
.hero-marquee{position:relative;z-index:2;margin-top:48px;overflow:hidden;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
  mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent)}
.hero-marquee-track{display:flex;gap:40px;width:max-content;animation:marqueeLeft 32s linear infinite;will-change:transform}
.hero-marquee:hover .hero-marquee-track{animation-play-state:paused}
.hero-marquee-item{display:inline-flex;align-items:center;gap:10px;font-family:var(--f-display);font-weight:700;
  font-size:18px;color:var(--g800);opacity:.62;white-space:nowrap}
.hero-marquee-item .dot{width:6px;height:6px;border-radius:50%;background:var(--g500)}
@keyframes marqueeLeft{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* Stat / kpi shimmer underline */
.kpi-card{position:relative;overflow:hidden}
.kpi-card::after{content:'';position:absolute;left:0;bottom:0;height:3px;width:100%;transform:scaleX(0);transform-origin:0 50%;
  background:linear-gradient(90deg,var(--g500),var(--g800));transition:transform .6s cubic-bezier(.16,1,.3,1)}
.kpi-card.in::after{transform:scaleX(1)}

/* GSAP reveal base (so content is visible if JS fails) */
.g-reveal{opacity:1}

/* Clip decorative overflow (aurora/blobs/marquee/ecg) without breaking sticky nav */
html{overflow-x:clip}
body{overflow-x:clip}
.gsap-ready .g-reveal{opacity:0;transform:translateY(40px)}

/* Pinned horizontal branches rail */
.pin-stage{position:relative}
.pin-rail{display:flex;gap:24px;align-items:stretch;padding:0 24px}
.pin-card{flex:0 0 clamp(280px,30vw,380px)}

/* Hero photo frame */
.hero-photo{position:relative;border-radius:22px;overflow:hidden;box-shadow:var(--sh-3);will-change:transform}
.hero-photo::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(30,59,50,.32));pointer-events:none}
.float-badge{position:absolute;z-index:4;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
  border:1px solid var(--line2);border-radius:14px;padding:12px 15px;box-shadow:var(--sh-2)}
[data-theme="dark"] .float-badge{background:rgba(30,40,34,.8)}

/* Section heading gradient accent word */
.grad-word{background:linear-gradient(120deg,var(--g600),var(--g800),var(--g500));-webkit-background-clip:text;
  background-clip:text;-webkit-text-fill-color:transparent}

/* Premium landing — responsive */
@media (max-width: 940px){
  .hero-layout{grid-template-columns:1fr !important; gap:36px !important}
  .hero-collage{min-height:380px !important}
  .whatwedo-grid{grid-template-columns:1fr !important; gap:32px !important}
  .srp-grid{grid-template-columns:1fr !important; gap:36px !important}
  .events-grid{grid-template-columns:1fr 1fr !important}
}
@media (max-width: 680px){
  .hero-collage{min-height:340px !important}
  .stats-grid{grid-template-columns:1fr 1fr !important}
  .events-grid{grid-template-columns:1fr !important}
  .testimonials-grid{grid-template-columns:1fr !important}
  .hero-marquee-item{font-size:15px}
  .scroll-cue{display:none}
}

/* ====================================================
   FOCUS & ACCESSIBILITY
   ==================================================== */
:focus-visible{
  outline:2px solid var(--g500);
  outline-offset:3px;
  border-radius:var(--r-sm);
}
button:focus-visible{border-radius:var(--r-sm)}
.btn:focus-visible{border-radius:999px}

/* ====================================================
   RESPONSIVE LAYOUT GRID UTILITIES
   ==================================================== */

/* Footer */
.footer-grid{
  display:grid;
  grid-template-columns:1.4fr 1fr 1fr 1fr;
  gap:48px;
}
.footer-bottom{
  margin-top:48px;padding-top:28px;
  border-top:1px solid rgba(255,255,255,.1);
  display:flex;justify-content:space-between;
  font-size:12px;color:#8a9b90;flex-wrap:wrap;gap:8px;
}

/* CTA band */
.cta-band-content{
  position:relative;
  display:grid;
  grid-template-columns:1.4fr 1fr;
  gap:40px;
  align-items:end;
}

/* Two-column content grids */
.two-col-grid{display:grid; grid-template-columns:1fr 1fr; gap:20px}
.two-col-grid-sm{display:grid; grid-template-columns:1fr 1fr; gap:16px}

/* Three-column grids */
.three-col-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px}

/* Four-column grids */
.four-col-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:16px}
.four-col-grid-line{display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border-radius:var(--r-lg); overflow:hidden; border:1px solid var(--line)}

/* About story layout */
.about-story-grid{display:grid; grid-template-columns:1fr 1.4fr; gap:60px}

/* Presidents */
.presidents-grid{display:grid; grid-template-columns:1fr 1fr; gap:24px}
.president-card-inner{display:grid; grid-template-columns:200px 1fr; overflow:hidden}

/* Contact */
.contact-layout{display:grid; grid-template-columns:1.2fr 1fr; gap:48px; align-items:start}

/* Chapters start-a-chapter */
.chapters-start-grid{display:grid; grid-template-columns:1fr 1.3fr; gap:48px; align-items:center}

/* ====================================================
   RESPONSIVE BREAKPOINTS FOR NEW UTILITIES
   ==================================================== */

/* 960px */
@media (max-width:960px){
  .about-story-grid{grid-template-columns:1fr; gap:40px}
  .four-col-grid{grid-template-columns:repeat(2,1fr); gap:12px}
  .four-col-grid-line{grid-template-columns:repeat(2,1fr)}
  .cta-band-content{grid-template-columns:1fr; gap:28px}
  .cta-band-content > div:last-child{justify-content:flex-start !important}
  .contact-layout{grid-template-columns:1fr}
  .chapters-start-grid{grid-template-columns:1fr; gap:36px}
}

/* 820px */
@media (max-width:820px){
  .three-col-grid{grid-template-columns:repeat(2,1fr)}
  .president-card-inner{grid-template-columns:1fr}
  .president-card-inner > div:first-child{min-height:240px}
  .presidents-grid{grid-template-columns:1fr}
  .two-col-grid{gap:14px}
}

/* 760px — existing breakpoint extended */
@media (max-width:760px){
  .footer-grid{grid-template-columns:1fr 1fr; gap:32px}
  .two-col-grid{grid-template-columns:1fr}
  .two-col-grid-sm{grid-template-columns:1fr}
  .about-story-grid{gap:28px}
  .cta-band-content{gap:20px}
}

/* 560px */
@media (max-width:560px){
  .footer-grid{grid-template-columns:1fr; gap:28px}
  .three-col-grid{grid-template-columns:1fr}
  .four-col-grid{grid-template-columns:1fr; gap:12px}
  .footer-bottom{flex-direction:column; gap:6px}
}

/* ====================================================
   VISUAL POLISH IMPROVEMENTS
   ==================================================== */

/* Slightly more generous section spacing rhythm */
.section + .section{/* natural spacing already from padding */}

/* Card hover - smoother, less jarring */
.card:hover{transform:translateY(-2px); box-shadow:var(--sh-2); border-color:var(--line2)}

/* Branch cards: keep existing more dynamic hover */
.branch-card:hover{transform:translateY(-4px) scale(1.005); box-shadow:var(--sh-3); border-color:var(--g300); opacity:1 !important}

/* Better pill sizing */
.pill{padding:5px 12px; font-size:12.5px}

/* Consistent eyebrow spacing */
.eyebrow{margin-bottom:0; gap:12px}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--g300);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:var(--g500)}

/* Dark mode map search */
[data-theme="dark"] .map-search-wrap input{background:var(--g50);border-color:var(--line2);color:var(--ink)}

/* Page hero responsive */
@media (max-width:860px){
  .page-hero .container{grid-template-columns:1fr !important}
}

/* Prevent orphan text */
h1,h2,h3{text-wrap:balance}

/* Better link transitions */
a{transition:color .15s ease, opacity .15s ease}

/* Improved stats grid for ImpactStats */
@media (max-width:940px){
  .stats-grid{grid-template-columns:repeat(2,1fr) !important}
}

/* ── Branch page responsive layouts ── */
.branch-hero-split{display:grid;grid-template-columns:1fr 1fr;min-height:100vh;position:relative;overflow:hidden}
.b-grid-hero{display:grid;grid-template-columns:1.2fr 1fr;gap:60px;align-items:center}
.b-stats-4{display:grid;grid-template-columns:repeat(4,1fr)}
.branch-cta-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:40px;align-items:center}
.b-two-col-wide{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center}
.b-grid-wide{display:grid;grid-template-columns:1fr 1.4fr;gap:60px}
@media(max-width:820px){
  .branch-hero-split{grid-template-columns:1fr;min-height:auto}
  .b-grid-hero{grid-template-columns:1fr;gap:32px}
  .branch-cta-grid{grid-template-columns:1fr;gap:24px}
}
@media(max-width:760px){
  .b-stats-4{grid-template-columns:repeat(2,1fr)}
  .b-stats-4 > *:nth-child(even){border-right:none !important}
  .b-two-col-wide{grid-template-columns:1fr;gap:28px}
  .b-grid-wide{grid-template-columns:1fr;gap:28px}
}
@media(max-width:700px){
  .b-event-row{grid-template-columns:1fr !important; min-height:auto !important}
}
@media(max-width:480px){
  .b-stats-4{grid-template-columns:1fr}
  .b-stats-4 > *{border-right:none !important}
}

</style>
